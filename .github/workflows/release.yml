# Release on a vX.Y.Z tag: push the multi-arch (amd64+arm64) image to ghcr and
# attach both binaries to the GitHub Release. Both deploy paths come from here.
name: release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"   # CalVer like 26.06.1

permissions:
  contents: write   # create the Release
  packages: write   # push to ghcr

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/thesada/thesada-app
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"

      # make build chains make css, so the embedded assets are populated.
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} make build
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}

      - run: mv bin/thesada-app bin/thesada-app-linux-${{ matrix.arch }}

      - uses: softprops/action-gh-release@v3
        with:
          files: bin/thesada-app-linux-${{ matrix.arch }}
          generate_release_notes: true
