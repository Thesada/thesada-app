{{define "title"}}Set new password - thesada{{end}}
{{define "content"}}
<div class="max-w-sm mx-auto bg-white p-6 rounded-xl shadow-sm border border-slate-200">
  <h1 class="text-xl font-semibold mb-1">Set a new password</h1>
  <p class="text-sm text-slate-500 mb-4">Minimum 10 characters.</p>
  {{if .Error}}
  <div class="mb-3 text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2">{{.Error}}</div>
  {{end}}
  {{if .Token}}
  <form method="POST" action="/reset-password" class="space-y-3">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <input type="hidden" name="token" value="{{.Token}}">
    <div>
      <label class="block text-xs font-medium text-slate-700 mb-1">New password</label>
      <input type="password" name="password" required minlength="10"
             class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-slate-400">
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-700 mb-1">Confirm</label>
      <input type="password" name="confirm" required minlength="10"
             class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-slate-400">
    </div>
    <button type="submit"
            class="w-full bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium py-2 rounded">
      Save new password
    </button>
  </form>
  {{else}}
  <p class="text-xs text-slate-500 mt-2">
    <a href="/forgot-password" class="underline">Request a new reset link</a>
  </p>
  {{end}}
</div>
{{end}}
